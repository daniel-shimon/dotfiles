
# agent-deck configuration
# agent-deck-tmux-config-version: 2
# Added by agent-deck installer - 2026-02-01
# https://github.com/asheshgoplani/agent-deck

# Terminal with true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set -ag terminal-overrides ",*256col*:Tc"

set -a terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm' # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colours - needs tmux-3.0

# Allow OSC passthrough (fixes neovim background detection)
set -g allow-passthrough on

# Performance
set -sg escape-time 0
set -g history-limit 50000

# Mouse support (scroll + drag-to-copy)
set -g mouse on

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# macOS clipboard integration
# Mouse drag selects but does not copy — hit Enter to copy and stay at scroll position
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane
bind-key -T copy-mode-vi Enter if-shell -F "#{selection_active}" "send-keys -X copy-pipe \"pbcopy\"" "send-keys -X cancel"
bind-key -T copy-mode Enter if-shell -F "#{selection_active}" "send-keys -X copy-pipe \"pbcopy\"" "send-keys -X cancel"
bind-key -T copy-mode-vi Escape if-shell -F "#{selection_active}" "send-keys -X clear-selection" "send-keys -X cancel"

# Double-click: open URL if cursor is on one, otherwise select word and copy
bind-key -n DoubleClick1Pane select-pane \; \
  if-shell "~/.tmux/scripts/open-url-at-cursor.sh #{mouse_x} #{mouse_y} #{pane_id}" \
    "" \
    "copy-mode ; send-keys -X select-word ; send-keys -X copy-pipe-no-clear pbcopy"
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; \
  if-shell "~/.tmux/scripts/open-url-at-cursor.sh #{mouse_x} #{mouse_y} #{pane_id}" \
    "send-keys -X cancel" \
    "send-keys -X select-word ; send-keys -X copy-pipe-no-clear pbcopy"

# Triple-click to select line and copy to clipboard
bind-key -n TripleClick1Pane select-pane \; copy-mode \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear "pbcopy"

# Right-click to copy selection in copy mode, paste otherwise
bind-key -T copy-mode-vi MouseDown3Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode MouseDown3Pane send-keys -X copy-pipe "pbcopy"
bind-key -n MouseDown3Pane run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Middle-click to paste (traditional Unix behavior - optional)
bind-key -n MouseDown2Pane run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Auto-enter copy-mode when scrolling up
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Scroll bindings in copy-mode (both vi and emacs modes) - one line at a time
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down

# Clear selection when clicking outside of it
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

# Stay in copy mode after yanking
set -g @yank_action 'copy-pipe'

# Keyboard shortcuts for copy mode (complementing mouse)
# Enter copy mode with prefix + [
bind-key [ copy-mode
# Paste with prefix + ]
bind-key ] paste-buffer

# Visual feedback when in copy mode
set -g mode-style "fg=black,bg=yellow"

# Pane resizing (Terminal.app doesn't pass Ctrl/Alt+Arrow through)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
